#   - run: npm ci

#   - run: npm test -- --watchAll=false

build-and-push:

runs-on: ubuntu-latest
needs: test

outputs:
  image_tag: ${{ steps.vars.outputs.tag }}

steps:

  - uses: actions/checkout@v4

  - name: Generate Tag
    id: vars
    run: |
      TAG=v${GITHUB_RUN_NUMBER}
      echo "tag=$TAG" >> $GITHUB_OUTPUT

  - name: Login DockerHub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_TOKEN }}

  - name: Setup Buildx
    uses: docker/setup-buildx-action@v3

  - name: Build Image
    uses: docker/build-push-action@v6
    with:
      context: .
      load: true
      tags: |
        ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}

  - name: Trivy Scan
    uses: aquasecurity/trivy-action@0.33.1
    with:
      image-ref: ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}
      severity: HIGH,CRITICAL
      exit-code: 1
      ignore-unfixed: true

  - name: Push Image
    uses: docker/build-push-action@v6
    with:
      context: .
      push: true
      tags: |
        ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}
        ${{ env.IMAGE_NAME }}:latest

update-gitops:

runs-on: ubuntu-latest

needs: build-and-push

steps:

  - name: Checkout GitOps Repo
    uses: actions/checkout@v4
    with:
      repository: ankur-06-2003/menifest999
      token: ${{ secrets.K8S_REPO_TOKEN }}
      path: manifests

  - name: Update Deployment Image
    run: |

      cd menisfest999/client

      sed -i "s|image: .*|image: ${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}|g" client_deployment.yaml

  - name: Commit Changes
    run: |

      cd manifests

      git config user.name "github-actions"
      git config user.email "github-actions@github.com"

      git add .

      git commit -m "Update image ${{ needs.build-and-push.outputs.image_tag }}" || exit 0

      git push origin main

summary:

runs-on: ubuntu-latest

if: always()

needs:
  - security-scan
  - test
  - build-and-push
  - update-gitops

steps:

  - run: |
      echo "Pipeline completed"

