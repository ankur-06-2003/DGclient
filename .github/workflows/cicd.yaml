name: Secure CI-CD

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/dg-client

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: ${{ github.event.repository.name }}
          path: .
          format: HTML

      - name: Upload Dependency Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/

  build-and-push:
    runs-on: ubuntu-latest
    needs: security-scan

    outputs:
      image_tag: ${{ steps.vars.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Tag
        id: vars
        run: |
          TAG=v0.0.${GITHUB_RUN_NUMBER}
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}

      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest

  update-gitops:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: ankur-06-2003/menifest999
          token: ${{ secrets.K8S_REPO_TOKEN }}
          path: manifests

      - name: Update Deployment Image
        run: |
          cd manifests/client

          sed -i "s|image: .*|image: ${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}|g" client_deployment.yaml

      - name: Commit and Push Changes
        run: |
          cd manifests

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          git commit -m "Update image ${{ needs.build-and-push.outputs.image_tag }}" || exit 0

          git push origin main

  summary:
    runs-on: ubuntu-latest
    if: always()

    needs:
      - security-scan
      - build-and-push
      - update-gitops

    steps:
      - name: Pipeline Summary
        run: |
          echo "Pipeline completed successfully."